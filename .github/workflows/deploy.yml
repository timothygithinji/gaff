name: Deploy

# Manual-only. This was a push-to-main auto-deploy when Gaff ran as a live
# service; on the archived/public repo it's gated behind a manual trigger so a
# push (or a fork) never auto-deploys. Run it from the Actions tab once you've
# set your own infra config + secrets. See docs/DEPLOY.md.
on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Setup
        uses: ./.github/actions/setup

      - name: Fetch secrets from Doppler
        uses: ./.github/actions/fetch-secrets
        with:
          doppler-token: ${{ secrets.DOPPLER_TOKEN }}

      # Provision Cloudflare infra (KV, R2, the R2 API token, and the Zero
      # Trust Access policy/app) via Pulumi BEFORE shipping code, so bindings
      # and the access gate are in place for the Worker deploy that follows.
      # Runs on every push to main; a no-op when nothing under
      # infra/cloudflare changed since the last `pulumi up`.
      #
      # PULUMI_ACCESS_TOKEN lives in Doppler (gaff/prd) and is exported into
      # $GITHUB_ENV by the Fetch-secrets step above — which is why this runs
      # AFTER it. pulumi/actions reads it from the environment (inherited, so
      # it's not re-listed under env: below). The Sync step further down
      # strips it before pushing the gaff secret set to the Worker, so this
      # account-provisioning credential never lands on the edge runtime.
      #
      # infra/cloudflare is NOT part of the root Bun workspace, so the root
      # Setup install doesn't cover it — it needs its own install.
      #
      # CLOUDFLARE_* come from repo secrets (not gaff/prd) and MUST carry full
      # provisioning scope (Zero Trust Access + account API tokens, not just
      # Workers/KV/R2) — the Pulumi program mints an account token and manages
      # the Access app. DOPPLER_TOKEN lets the @pulumiverse/doppler provider
      # read the R2_* secrets it manages; read-only is fine since those values
      # don't change here.
      - name: Install infra dependencies
        working-directory: infra/cloudflare
        run: bun install --frozen-lockfile

      - name: Provision infrastructure
        uses: pulumi/actions@v6
        with:
          command: up
          # <pulumi-org>/<stack>. Change to your own Pulumi org.
          stack-name: yourorg/production
          work-dir: infra/cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

      # Sync the Worker's encrypted secrets from Doppler on every deploy.
      #
      # `wrangler deploy` ships code but never touches secrets — it leaves
      # whatever set already exists on the Worker. CI, meanwhile, always
      # builds *correct code* against that (possibly stale) secret set. Since
      # `src/lib/env.ts` validates the ENTIRE schema on the first `env()` call
      # — which the root route's `beforeLoad` hits on every request — a single
      # missing secret 500s the whole app while `dev:prod` stays green (it has
      # the full Doppler set in `process.env`). That exact drift took prod down
      # once already. Syncing here makes the Worker's secrets track Doppler.
      #
      # Runs BEFORE deploy so a newly-required secret is in place before the
      # code that reads it goes live. `--no-file` + stdin keeps secrets in
      # memory (never on disk, per the repo's "Doppler runtime injection only"
      # convention); `secret bulk` uploads them in one shot and prints only
      # names, never values. `jq del(.PULUMI_ACCESS_TOKEN)` drops the Pulumi
      # token — the Provision step needs it but the Worker must never hold a
      # provisioning credential. The `doppler` CLI is installed by the
      # fetch-secrets step above. Requires the Worker to already exist — it's
      # first created (with initial secrets) by `t-stack provision`.
      - name: Sync Worker secrets to Cloudflare
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: doppler secrets download --no-file --format=json | jq 'del(.PULUMI_ACCESS_TOKEN)' | bunx wrangler secret bulk --name gaff

      # Apply pending Drizzle migrations BEFORE the Worker ships, so the
      # freshly-deployed code never sees a schema older than what it was
      # compiled against. drizzle-kit is idempotent — it reads
      # `drizzle.__drizzle_migrations` and no-ops anything already
      # applied, so this step is safe on every push.
      #
      # Drift incident this guards against: migration 0017
      # (`station_routes`) added an `ALTER TABLE enrichments ADD COLUMN`
      # alongside the code that selects the new column. CI passed
      # (typecheck saw the column on the Drizzle schema; tests don't
      # touch a DB), deploy shipped the code, and every read of
      # `enrichments` 500'd until the migration was applied manually.
      #
      # `DATABASE_URL` is already in $GITHUB_ENV from the Fetch-secrets
      # step (Doppler `gaff/prd`). We call drizzle-kit directly rather
      # than `bun run db:migrate:prod`, which wraps `doppler run` with a
      # personal-scope flag intended for local dev.
      #
      # `migrations.ts --check-only` validates the journal/snapshot
      # chain before any DDL fires, so an inconsistent metadata state
      # fails the deploy without partially-applying anything.
      - name: Apply DB migrations
        run: |
          bun scripts/validation/migrations.ts --check-only
          bunx drizzle-kit migrate

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run deploy
